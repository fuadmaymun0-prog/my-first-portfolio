
<!DOCTYPE html>  <html>  
<head>  
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">  
  <link rel="stylesheet" href="style.css">  
  <title>Modern Log In Form</title>  </head>  
<body>  
  <div class="container" id="container">  
  <div class="form-container sign-up">  
    <form>  
      <h1>Create Accounts</h1>  
      <span>or use your email for ragisteration </span>  
      <input type="text" placeholder="Name">  
      <input type="email" placeholder="Email">  
      <input type="password" placeholder="Password">  
      <button>Sign up</button>  
    </form>  
  </div>  
    
   <div class="form-container sign-in">  
    <form>  
      <h1> Sign In</h1>  
      <span>or use your email for ragisteration</span>  
      <input type="email" placeholder="Email">  
      <input type="password" placeholder="Password">  
      <a href="#">Forget Your password?</a>  
      <button>Sign In</button>  
    </form>  
  </div>  
    <div class="toggle-container">  
      <div class="toggle">  
      <div class="toggle-panel toggle-left">  
        <h1>Welcome Back!</h1>  
        <p>Enter Your personal details   
          to use all of site features  
        </p>  
        <button class="hidden" id="login">Sign Up</button> 
        
    </div>  
        <div class="toggle-panel toggle-right">  
        <h1>Hello, Friend!</h1>  
        <p>Register with Your personal details   
          to use all of site features  
        </p>  
        <button class="hidden" id="register">Sign Up</button>  
    </div>  
    </div> 
    </div>  
  </div>  <script src="script.js"></script> </body>  
</html>
