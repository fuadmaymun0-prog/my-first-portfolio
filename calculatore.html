<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pro Responsive Calculator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
  font-weight:700;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  padding:15px;
}

/* ===== CALCULATOR CARD ===== */
.calculator{
  width:100%;
  max-width:380px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.15);
  padding:20px;
  border-radius:28px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* ===== DISPLAY ===== */
.display{
  background:rgba(0,0,0,0.75);
  color:#00ffd5;
  padding:18px;
  font-size:clamp(24px,5vw,34px);
  border-radius:18px;
  text-align:right;
  min-height:75px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  word-break:break-all;
  box-shadow:inset 0 0 12px rgba(0,255,213,0.15);
  letter-spacing:1px;
}

/* ===== HISTORY ===== */
.history{
  background:rgba(255,255,255,0.06);
  color:#d1d5db;
  font-size:14px;
  padding:12px;
  border-radius:14px;
  margin-top:12px;
  min-height:55px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  text-align:right;
  overflow:auto;
}

/* ===== BUTTON GRID ===== */
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:18px;
}

/* ===== BUTTON STYLE ===== */
button{
  padding:18px;
  font-size:clamp(18px,4vw,22px);
  border:none;
  border-radius:18px;
  cursor:pointer;
  background:rgba(255,255,255,0.12);
  color:white;
  transition:all 0.2s ease;
  box-shadow:0 6px 12px rgba(0,0,0,0.25);
  -webkit-tap-highlight-color:transparent;
}

button:hover{
  transform:translateY(-2px);
}

button:active{
  transform:scale(0.95);
}

/* ===== SPECIAL BUTTONS ===== */
.op{
  background:linear-gradient(135deg,#f59e0b,#ffb703);
  color:#111;
}

.eq{
  background:linear-gradient(135deg,#00c896,#00f5c3);
  color:#042f2e;
  font-size:24px;
}

.cl{
  background:linear-gradient(135deg,#ef4444,#ff6b6b);
}

.zero{
  grid-column:span 2;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width:480px){
  .calculator{
    padding:16px;
    border-radius:22px;
  }

  .buttons{
    gap:10px;
  }

  button{
    padding:16px;
    border-radius:16px;
  }

  .display{
    min-height:68px;
  }
}

/* ===== SMALL DEVICES ===== */
@media (max-width:340px){
  button{
    padding:14px;
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="calculator">

  <div id="display" class="display">0</div>
  <div id="history" class="history"></div>

  <div class="buttons">

    <button onclick="press('(')">(</button>
    <button onclick="press(')')">)</button>
    <button onclick="backspace()">⌫</button>
    <button class="cl" onclick="clearAll()">C</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('/')">÷</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('*')">×</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="op" onclick="press('-')">−</button>

    <button class="zero" onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button class="op" onclick="press('+')">+</button>

    <button class="eq" onclick="calculate()">=</button>

  </div>
</div>

<script>
let expression = "";

function press(val){
  if(expression === "0") expression = "";
  expression += val;
  document.getElementById("display").innerText = expression;
}

function clearAll(){
  expression = "";
  document.getElementById("display").innerText = "0";
  document.getElementById("history").innerText = "";
}

function backspace(){
  expression = expression.slice(0,-1);
  document.getElementById("display").innerText = expression || "0";
}

function calculate(){
  try{
    let result = Function("return " + expression)();

    document.getElementById("history").innerText =
      expression + " = " + result;

    expression = result.toString();
    document.getElementById("display").innerText = expression;

  } catch{
    document.getElementById("display").innerText = "Error";
    expression = "";
  }
}

/* Keyboard Support */
document.addEventListener("keydown", function(e){

  if("0123456789+-*/().".includes(e.key)){
    press(e.key);
  }

  if(e.key === "Enter"){
    calculate();
  }

  if(e.key === "Backspace"){
    backspace();
  }

});
</script>

</body>
</html>
